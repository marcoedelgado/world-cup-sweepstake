<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- Background -->
  <rect width="100" height="120" fill="#3a7bd5" rx="8"/>

  <!-- Body / shirt (red) -->
  <rect x="30" y="68" width="40" height="32" fill="#e63946" rx="4"/>
  <!-- Shirt number -->
  <text x="50" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="sans-serif">9</text>
  <!-- Collar -->
  <polygon points="44,68 50,76 56,68" fill="#c1121f"/>

  <!-- Neck -->
  <rect x="44" y="58" width="12" height="12" fill="#f4a261" rx="2"/>

  <!-- Head -->
  <ellipse cx="50" cy="46" rx="18" ry="20" fill="#f4a261"/>

  <!-- Hair -->
  <ellipse cx="50" cy="28" rx="18" ry="10" fill="#333"/>
  <rect x="32" y="28" width="36" height="10" fill="#333"/>

  <!-- Eyes -->
  <ellipse cx="43" cy="44" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="57" cy="44" rx="3" ry="3.5" fill="white"/>
  <circle cx="44" cy="44" r="1.8" fill="#333"/>
  <circle cx="58" cy="44" r="1.8" fill="#333"/>

  <!-- Eyebrows -->
  <line x1="40" y1="39" x2="47" y2="40" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="53" y1="40" x2="60" y2="39" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="50" cy="50" rx="2" ry="1.5" fill="#e08a50"/>

  <!-- Smile -->
  <path d="M44 55 Q50 60 56 55" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="32" cy="47" rx="4" ry="5" fill="#f4a261"/>
  <ellipse cx="68" cy="47" rx="4" ry="5" fill="#f4a261"/>

  <!-- Arms -->
  <rect x="14" y="68" width="16" height="8" fill="#e63946" rx="4"/>
  <rect x="70" y="68" width="16" height="8" fill="#e63946" rx="4"/>
  <!-- Hands -->
  <circle cx="13" cy="72" r="5" fill="#f4a261"/>
  <circle cx="87" cy="72" r="5" fill="#f4a261"/>

  <!-- Shorts -->
  <rect x="30" y="98" width="18" height="16" fill="#1d3557" rx="2"/>
  <rect x="52" y="98" width="18" height="16" fill="#1d3557" rx="2"/>

  <!-- Socks + boots -->
  <rect x="30" y="112" width="18" height="8" fill="white" rx="2"/>
  <rect x="52" y="112" width="18" height="8" fill="white" rx="2"/>
</svg>
